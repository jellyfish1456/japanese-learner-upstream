name: Refresh News Articles

on:
  schedule:
    # Every 2 days at 06:00 UTC (14:00 台灣時間)
    - cron: "0 6 */2 * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force regenerate even if already ran today"
        required: false
        default: "false"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk --no-save

      - name: Generate new articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force mode: removing today's articles first"
            node -e "
              const fs = require('fs');
              const file = 'src/data/shadowing-news.json';
              const today = new Date().toISOString().split('T')[0];
              const data = JSON.parse(fs.readFileSync(file, 'utf-8'));
              const filtered = data.filter(a => a.date !== today);
              fs.writeFileSync(file, JSON.stringify(filtered, null, 2) + '\n');
              console.log('Removed articles for ' + today);
            "
          fi
          node scripts/refresh-articles.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +'%Y-%m-%d')
          git add src/data/shadowing-news.json src/pages/SettingsPage.tsx
          git commit -m "auto: refresh news articles ${DATE}

          Generated by scheduled GitHub Actions workflow.
          Co-Authored-By: Claude Haiku 4.5 <noreply@anthropic.com>"
          git push

      - name: Trigger deploy
        if: steps.changes.outputs.changed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
